services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ./data/demo:/app/data/demo:ro
      - ./backend/app/uploads:/app/app/uploads
      - ./backend/app/outputs:/app/app/outputs
    environment:
      - DEMO_DATA_DIR=/app/data/demo
      - INFERENCE_MODE=${INFERENCE_MODE:-stub}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY:-}
      - FIREWORKS_MODEL=${FIREWORKS_MODEL:-accounts/fireworks/models/glm-5p2}
      - XVIEW2_DOCKER_IMAGE=${XVIEW2_DOCKER_IMAGE:-darknem-xview2-inference}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

  # Build only: docker compose build ml
  # Run inference via backend when INFERENCE_MODE=docker
  ml:
    build:
      context: ./ml/inference
      dockerfile: Dockerfile
    image: darknem-xview2-inference
    profiles:
      - build-ml
